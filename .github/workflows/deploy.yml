name: Deploy

on:
  push:
    branches: [main]

# Auto-deploy on main: frontend to Cloudflare Pages, backend (migrations + edge
# functions) to Supabase. Requires these repository secrets:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_DB_PASSWORD
#   SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY   (baked into the frontend bundle)
#   CHESSCOM_CONTACT                         (edge-function secret)
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @blitzkrieg/web build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: Deploy frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name blitzkrieg

      - name: Deploy backend to Supabase (migrations + edge functions)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          supabase db push
          supabase secrets set CHESSCOM_CONTACT="${{ secrets.CHESSCOM_CONTACT }}"
          supabase functions deploy
